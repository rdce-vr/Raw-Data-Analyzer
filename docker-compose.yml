version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticketing_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:your_secure_password_here@db:5432/ticketing
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  postgres_data:
